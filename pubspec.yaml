name: videocapturingapp
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
    
  camera: ^0.10.5+9
  android_intent_plus: ^5.0.21
  open_filex: ^4.3.2
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
#The above line is for opening the gallery app after saving the video
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.14.0
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0


flutter:
  assets:
    - assets/icon/
  
  uses-material-design: true

  
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"